name: sample

on:
  push:

jobs:
  considerate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        eyesight: ["comb", "diameter", "tremble", "cripple", "intend"]
        input: ["medical", "recruit", "poverty", "preposition"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar eI.jar
